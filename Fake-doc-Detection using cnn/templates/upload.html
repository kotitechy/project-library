<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PAN Card Detection</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='fav.ico') }}">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Body and Base Styles */
    body {
        font-family: 'Roboto', sans-serif;
        background-color: #f4f7fa;
        color: #333;
        line-height: 1.6;
    }

    /* Navbar */
    .navbar {
        background-color: #222;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
    }

    .navbar .logo a {
        color: #00bcd4;
        font-size: 1.5rem;
        font-weight: bold;
        text-decoration: none;
    }

    .nav-links {
        list-style: none;
        display: flex;
        gap: 1.5rem;
    }

    .nav-links li a {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s;
    }

    .nav-links li a:hover {
        color: #00bcd4;
    }

    /* Detection Section */
    .detection-section {
        padding: 4rem 2rem;
        text-align: center;
    }

    .detection-section h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        color: #222;
    }

    .detection-section p {
        font-size: 1.1rem;
        margin-bottom: 2rem;
        color: #666;
    }

    /* Form */
    .detection-form {
        max-width: 500px;
        margin: 0 auto;
        text-align: left;
        background-color: #fff;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
    }

    .form-group input[type="file"] {
        padding: 0.5rem;
        width: 100%;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    /* Button */
    .btn {
        background-color: #00bcd4;
        color: white;
        padding: 0.7rem 1.5rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        transition: background-color 0.3s;
    }

    .btn:hover {
        background-color: #0097a7;
    }

    /* Status Message */
    .status {
        margin-top: 1.5rem;
        font-size: 1rem;
        font-weight: 500;
    }

    .status p {
        color: #555;
    }

    /* Footer */
    footer {
        background-color: #222;
        color: #bbb;
        text-align: center;
        padding: 1rem;
        margin-top: 4rem;
        font-size: 0.9rem;
    }
</style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">
      <a href="http://127.0.0.1:5000/home">FakeDocDetect</a>
    </div>
    <ul class="nav-links">
      <li><a href="http://127.0.0.1:5000/home">Home</a></li>
      <!-- <li><a href="http://127.0.0.1:5000/f_c">Template certificate</a></li> -->
    </ul>
  </nav>

  <!-- PAN Card Detection Section -->
  <section class="detection-section">
    <div class="container">
      <h1>PAN Card Detection</h1>
      <p>Upload a scanned copy of the PAN card. Our system will analyze and verify its authenticity.</p>
      <form id="detection-form" action="/upload" method="POST" enctype="multipart/form-data" class="detection-form">
        <div class="form-group">
          <label for="original-upload">Upload Original PAN Card Image</label>
          <input type="file" id="original-upload" name="original_image" accept="image/*" required />
        </div>
        <div class="form-group">
          <label for="tampered-upload">Upload Scanned Image To Validate</label>
          <input type="file" id="tampered-upload" name="tampered_image" accept="image/*" required />
        </div>
        <div class="form-group">
          <button type="submit" class="btn">Detect PAN Card Authenticity</button>
        </div>
      </form>
      <div class="status">
        <p id="status-message">Status: Waiting for an PAN card to be uploaded...</p>
      </div>
    </div>
  </section>

  <!-- Footer Section -->
  <footer>
    <p>&copy; 2025 FakeDocDetect | All Rights Reserved</p>
  </footer>

  <!-- JavaScript -->
  <script>
    const form = document.getElementById('detection-form');
    const statusMessage = document.getElementById('status-message');

    form.addEventListener('submit', function (event) {
      event.preventDefault(); // Prevent the default form submission

      const formData = new FormData(form);

      // Perform the AJAX request
      fetch('/upload', {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        const { status, ssim_score } = data;
        statusMessage.textContent = `Status: ${status} (SSIM Score: ${ssim_score.toFixed(2)})`;
        statusMessage.style.color = status.includes('FAKE') || status.includes('suspicious') ? 'red' : 'green';
      })
      .catch(error => {
        console.error('Error:', error);
        statusMessage.textContent = 'Status: Error during detection. Please try again.';
        statusMessage.style.color = 'red';
      });
    });
  </script>
</body>
</html>
