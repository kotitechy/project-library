<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAN Card Originality Prediction</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='fav.ico') }}">
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
  
    /* Base Styles */
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f4f7fa;
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
    }
  
    /* Container */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
    }
  
    /* Navbar */
    .navbar {
      background-color: #222;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }
  
    .navbar .logo a {
      color: #00bcd4;
      font-size: 1.5rem;
      font-weight: bold;
      text-decoration: none;
    }
  
    .nav-links {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }
  
    .nav-links li a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
  
    .nav-links li a:hover {
      color: #00bcd4;
    }
  
    /* Detection Section */
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #222;
    }
  
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #666;
    }
  
    /* Form */
    .detection-form {
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
      background-color: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
  
    .form-group {
      margin-bottom: 1.5rem;
    }
  
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
  
    .form-group input[type="file"] {
      padding: 0.5rem;
      width: 100%;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
  
    /* Button */
    .btn {
      background-color: #00bcd4;
      color: white;
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.3s;
      width: 100%;
    }
  
    .btn:hover {
      background-color: #0097a7;
    }
  
    /* Result Display */
    .result {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 1rem;
      font-weight: 500;
      color: #555;
    }
  
    /* Footer */
    footer {
      background-color: #222;
      color: #bbb;
      text-align: center;
      padding: 1rem;
      margin-top: 4rem;
      font-size: 0.9rem;
    }
  
    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }
  
      .detection-form {
        padding: 1.5rem;
      }
  
      .btn {
        width: auto;
      }
    }
  </style>
  
</head><!-- Navigation Bar -->
<nav class="navbar">
  <div class="logo">
    <a href="http://127.0.0.1:5000/home">FakeDocDetect</a>
  </div>
  <ul class="nav-links">
    <li><a href="http://127.0.0.1:5000/home">Home</a></li>
    <!-- <li><a href="http://127.0.0.1:5000/f_c">Template certificate</a></li> -->
  </ul>
</nav>

<body>
  <div class="container">
    <h1>PAN Card Originality Prediction</h1>
    <p>Upload a scanned copy of the PAN card. Our system will analyze and verify its authenticity.</p>
    
    <!-- Form to upload image and trigger prediction -->
    <form id="cnn-form" action="/p_m" method="POST" enctype="multipart/form-data" class="detection-form">
      <div class="form-group">
        <label for="tampered-upload">Upload Scanned Image To Validate:</label>
        <input type="file" id="tampered-upload" name="tampered_image" accept="image/*" required />
      </div>
      
      <div class="form-group">
        <button type="submit" class="btn">Upload & Predict</button>
      </div>
    </form>
    
    <!-- Display prediction results -->
    <div id="result" class="result">
      <!-- Prediction result will be displayed here -->
    </div>
  </div>

  <script>
    // Handle form submission and show prediction result without reloading the page
    document.getElementById('cnn-form').addEventListener('submit', function(e) {
      e.preventDefault(); // Prevent form from submitting the traditional way
      
      const formData = new FormData(this);
      fetch('/p_m', {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        const resultDiv = document.getElementById('result');
        if (data.status && data.probability !== undefined) {
          resultDiv.innerHTML = `<h3>Prediction Result:</h3>
            <p>Status: ${data.status}</p>
          } else {
          <p>Probability: ${data.probability}</p>`; 
          resultDiv.innerHTML = `<p>Status: ${data.status}</p>`;
        }
      })
      .catch(error => {
        console.error('Error:', error);
      });
    });
  </script>
</body>
</html>
