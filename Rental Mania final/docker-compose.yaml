services:
  react:
    build: ./react
    container_name: react-app
    ports:
      - "3000:3000"
    depends_on:
      - fastapi
    networks:
      - appnet

  fastapi:
    build: ./fastapi
    container_name: fastapi-app
    ports:
      - "8000:8000"
    networks:
      - appnet

networks:
  appnet:
